{% set name = "pipfile" %}
{% set version = "0.0.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: f7d9f15de8b660986557eb3cc5391aa1a16207ac41bc378d03f414762d36c984

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - pip
  run:
    - python >={{ python_min }}
    - toml

test:
  requires:
    - python {{ python_min }}
  imports:
    - pipfile
    - pipfile.api

about:
  home: https://github.com/pypa/pipfile
  license:  BSD or Apache, Version 2.0
  license_family: BSD
  license_file: LICENSE
  summary: 'Pipfile: the replacement for requirements.txt'
  description: |
    Pipfile and its sister Pipfile.lock are a replacement for the 
    existing standard pip_ s requirements.txt file.

extra:
  recipe-maintainers:
    - holgern
